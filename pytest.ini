[pytest]
; ---------------------------------------------------------------------
; Test discovery
; ---------------------------------------------------------------------
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

; ---------------------------------------------------------------------
; Default CLI options applied to every run
; (report path uses a fixed name; override with -p no:cacheprovider etc.
;  as needed on the command line)
; ---------------------------------------------------------------------
addopts =
    -v
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    --capture=sys

; ---------------------------------------------------------------------
; Custom markers (must be declared to satisfy --strict-markers)
; ---------------------------------------------------------------------
markers =
    smoke: quick critical-path checks, safe to run on every commit
    regression: full regression coverage
    login: tests covering authentication flows
    cart: tests covering shopping cart behavior
    checkout: tests covering the checkout / order-placement flow
    search: tests covering product search
    negative: tests that intentionally exercise failure/error paths

; ---------------------------------------------------------------------
; Logging shown in the console during a run (separate from file logging
; configured in utilities/logger_utility.py)
; ---------------------------------------------------------------------
log_cli = false
log_cli_level = INFO

filterwarnings =
    ignore::DeprecationWarning
