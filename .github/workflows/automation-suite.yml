name: Automation Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run against"
        required: false
        default: "qa"
      browser:
        description: "Browser to run on"
        required: false
        default: "chrome"

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automation suite (headless, parallel)
        env:
          STANDARD_USER_PASSWORD: ${{ secrets.STANDARD_USER_PASSWORD }}
          LOCKED_OUT_USER_PASSWORD: ${{ secrets.LOCKED_OUT_USER_PASSWORD }}
          INVALID_USER_PASSWORD: ${{ secrets.INVALID_USER_PASSWORD }}
          TEST_CARD_NUMBER: ${{ secrets.TEST_CARD_NUMBER }}
          TEST_CARD_EXPIRY: ${{ secrets.TEST_CARD_EXPIRY }}
          TEST_CARD_CVV: ${{ secrets.TEST_CARD_CVV }}
        run: |
          pytest -n auto --headless \
            --env=${{ github.event.inputs.environment || 'qa' }} \
            --browser=${{ github.event.inputs.browser || 'chrome' }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: reports/report.html

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: logs/
