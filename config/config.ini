; ==========================================================================
; Global Framework Configuration
; --------------------------------------------------------------------------
; This file controls DEFAULT execution settings. Every value here can be
; overridden at runtime via command line, e.g.:
;   pytest --env=qa --browser=chrome
;
; Environment switching is done from this single file (or CLI override).
; No URLs, credentials, or environment-specific values live here.
; ==========================================================================

[DEFAULT]
; Supported values: qa | dev | prod
environment = qa

; Supported values: chrome | firefox | edge
browser = chrome

; true = run browser without a visible UI window
headless = false

; Implicit wait fallback (seconds). Framework primarily uses EXPLICIT waits.
implicit_wait = 5

; Default explicit wait timeout (seconds)
explicit_wait = 15

; Page load timeout (seconds)
page_load_timeout = 30

; Number of automatic retries for a failed test
retry_count = 1

; Take a screenshot on every failure
screenshot_on_failure = true

[REPORT]
report_dir = reports
report_title = Ecommerce Automation Test Report

[LOGGING]
log_dir = logs
log_level = INFO
